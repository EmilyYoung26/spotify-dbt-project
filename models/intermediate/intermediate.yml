version: 2

models:
  - name: int_track_deduped_enriched
    description: "One row per deduplicated track enriched with buckets and feature groupings."
    columns:
      - name: track_id
        tests:
          - not_null
          - unique

  - name: int_track_artists
    description: "One row per track-artist combination."
    columns:
      - name: track_id
        tests:
          - not_null
      - name: artist_name
        tests:
          - not_null

  - name: int_track_duplicate_analysis
    description: "Helper model used to inspect duplicate track_ids in the staging layer."
    columns:
      - name: track_id
        tests:
          - not_null
      - name: row_count
        tests:
          - not_null