version: 2

models:
  - name: dim_genres
    columns:
      - name: genre
        tests:
          - not_null
          - unique

  - name: dim_artist
    columns:
      - name: artist_name
        tests:
          - not_null
          - unique

  - name: dim_albums
    columns:
      - name: album_name
        tests:
          - not_null
          - unique

  - name: dim_track
    columns:
      - name: track_id
        tests:
          - not_null
          - unique
      - name: track_name
        tests:
          - not_null

  - name: fact_track_artist_metrics
    columns:
      - name: track_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_track')
                field: track_id

      - name: artist_name
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_artist')
                field: artist_name

      - name: genre
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_genres')
                field: genre

      - name: album_name
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_albums')
                field: album_name

      - name: popularity
        tests:
          - not_null
          - popularity_between_0_and_100

      - name: popularity_bucket
        tests:
          - accepted_values:
              arguments:
                values: ['unknown', '0-24', '25-49', '50-74', '75-100']

  - name: mart_top_artists_by_genre
    description: "Top 3 artists per genre based on total popularity."
    columns: 
      - name: genre
        tests: 
          - not null 

      - name: artist_name
        tests:
          - not null

      - name: total_popularity

      - name: rank_in_genre