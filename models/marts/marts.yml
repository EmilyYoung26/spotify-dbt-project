version: 2

models:
  - name: dim_genres
    columns: 
      - name: genre_id
        tests: 
          - not_null
          - unique

      - name: genre 
        tests: 
          - not_null

  - name: dim_artists
    columns:
      - name: artist_id
        tests: 
          - not_null
          - unique

      - name: artist_name
        tests: 
          - not_null

  - name: fact_tracks
    columns: 
      - name: track_id 
        tests:
          - not_null
          - unique

      - name: genre_id
        tests: 
          - not_null
          - relationships:
              arguments: 
                to: ref('dim_genres')
                field: genre_id
          
      - name: artist_id
        tests: 
          - relationships: 
              arguments:
                to: ref('dim_artists')
                field: artist_id

      - name: popularity
        tests: 
          - not_null
          - popularity_between_0_and_100

      - name: popularity_bucket
        tests:
          - accepted_values:
              arguments:
                values: ['unknown', '0-24', '25-49', '50-74', '75-100']

  - name: bridge_track_artists
    columns: 
      - name: track_id
        tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('fact_tracks')
                field: track_id

      - name: artist_id
        tests: 
          - not_null
          - relationships: 
              arguments:
                to: ref('dim_artists')
                field: artist_id
